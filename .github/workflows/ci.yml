name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports:
          - 6333:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall -q src tests scripts

      - name: Unit and smoke tests
        env:
          OUTPUT_ROOT: /tmp/decisionops-control-tower-ci
        run: scripts/run_all.sh

      - name: Qdrant golden-set integration
        run: >-
          python scripts/evaluate_rag.py
          --output-root /tmp/decisionops-control-tower-ci
          --vector-store qdrant
          --report-json /tmp/decisionops-control-tower-ci/reports/rag_evaluation_qdrant.json
          --minimum-pass-rate 1.0
