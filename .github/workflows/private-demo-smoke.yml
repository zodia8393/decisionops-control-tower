name: private-demo-smoke

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: private-demo-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  authenticated-approval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate ephemeral role credentials
        run: |
          python - <<'PY'
          import os
          import secrets

          credentials = {
              "VIEWER_TOKEN": secrets.token_urlsafe(32),
              "REVIEWER_TOKEN": secrets.token_urlsafe(32),
              "ADMIN_TOKEN": secrets.token_urlsafe(32),
          }
          for value in credentials.values():
              print(f"::add-mask::{value}")
          role_tokens = (
              f"viewer:{credentials['VIEWER_TOKEN']},"
              f"reviewer:{credentials['REVIEWER_TOKEN']},"
              f"admin:{credentials['ADMIN_TOKEN']}"
          )
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              for name, value in credentials.items():
                  env_file.write(f"{name}={value}\n")
              env_file.write(f"CONTROL_TOWER_ROLE_TOKENS={role_tokens}\n")
          PY

      - name: Build deterministic demo state
        env:
          OUTPUT_ROOT: /tmp/decisionops-control-tower-private-demo
          BIKE_ROOT: /tmp/missing-bike-root
          WORKBENCH_ROOT: /tmp/missing-workbench-root
        run: env -u CONTROL_TOWER_ROLE_TOKENS -u CONTROL_TOWER_API_TOKEN scripts/run_all.sh

      - name: Exercise authenticated approval flow
        env:
          OUTPUT_ROOT: /tmp/decisionops-control-tower-private-demo
          BIKE_ROOT: /tmp/missing-bike-root
          WORKBENCH_ROOT: /tmp/missing-workbench-root
          CONTROL_TOWER_DEPLOYMENT_MODE: hosted
        run: |
          scripts/run_server.sh >/tmp/control-tower-private-demo.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8093/health >/dev/null; then
              break
            fi
            sleep 1
          done
          PYTHONPATH=src python scripts/verify_private_demo.py \
            --url http://127.0.0.1:8093 \
            --exercise-write
          python - <<'PY'
          import os
          from pathlib import Path

          log_text = Path("/tmp/control-tower-private-demo.log").read_text(
              encoding="utf-8",
              errors="replace",
          )
          for name in ("VIEWER_TOKEN", "REVIEWER_TOKEN", "ADMIN_TOKEN"):
              if os.environ[name] in log_text:
                  raise SystemExit("credential leaked to application log")
          PY
