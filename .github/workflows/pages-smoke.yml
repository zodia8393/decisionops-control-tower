name: pages-smoke

on:
  workflow_run:
    workflows: ["pages-demo"]
    branches: ["main"]
    types: [completed]
  schedule:
    - cron: "29 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-smoke
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify public demo
        run: python scripts/smoke_public_demo.py
